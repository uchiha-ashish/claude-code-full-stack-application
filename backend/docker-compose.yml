services:
  postgres:
    image: postgres:16-alpine
    container_name: scalpscan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: scalpscan
      POSTGRES_PASSWORD: scalpscan
      POSTGRES_DB: scalpscan
    ports:
      - "5432:5432"
    volumes:
      - scalpscan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scalpscan"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  scalpscan_pgdata:
